findings:
  energy_gap_sign_validated: |
    The sign prediction of EnergyGap.lean is empirically confirmed:
    E_mixture > E_concentrated at beta=8. The gap is positive.
    Magnitude is 26% of predicted beta^-1*log(N) — the formula gives an upper bound.

  beta_regime_transition: |
    Three distinct regimes discovered empirically:
      beta < 5 (N=20, dim=128): All states are mixtures. No concentrated FPs.
      beta = 8: Coexistence zone. Both FP types present.
      beta > 10: All concentrated. Mixture FPs are unstable.
    The transition is sharp, not gradual. This matches the exponential in the capacity formula.

  basin_width_in_high_dim: |
    Basin width ratio (mix/conc) under isotropic noise = 0.925, not sqrt(N)=4.47.
    Explanation: mixture FP instability is along the (p1-p2) direction (1D).
    Random noise in dim=128 has projection 1/sqrt(128) onto this direction.
    The mixture basin is narrow in the critical direction but the random noise
    doesn't probe it. The proof's basin volume formula applies to the relevant
    subspace, not the full ambient space.

  dream_utility_window: |
    Dream adds value ONLY near the capacity boundary. When N << N_max (under capacity),
    there are no mixture FPs to clean — dream is a no-op. When N >> N_max (over capacity),
    concentrated FPs don't exist — dream can't help. The useful regime is N approx N_max.
    This is consistent with the proof: the capacity formula defines exactly where
    the system transitions from healthy to degraded.

  p1_requires_high_beta: |
    For tight clusters (spread=0.04, within-cluster cosine distance ~0.05-0.12):
    P@1 requires beta >= 50. At beta=5-20, the system correctly identifies the cluster
    but returns the wrong specific pattern. This is the precision/associativity tradeoff.

  nrem_centroid_collapse: |
    NREM replay at very high beta (40x) with tight clusters pulls tagged patterns
    toward cluster centroids, REDUCING within-cluster distinctness. The capacity
    formula predicts this: with delta=0.05, capacity at beta=40 is exp(2)/160 < 1.
    The proof says individual patterns can't be maintained at this beta/delta combination.
    NREM should use adaptive beta that respects the local capacity bound.

