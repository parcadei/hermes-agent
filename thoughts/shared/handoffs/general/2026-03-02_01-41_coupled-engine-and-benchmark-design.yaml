decisions:
  - w_is_dim_dim: "W must be (dim,dim) not (N,N) because dream_ops functions (nrem_replay, rem_unlearn, boltzmann_dynamics) do W @ x where x is (dim,). The spec said N×N but the code contracts require dim×dim."
  - query_uses_spreading_activation: "Query uses spreading_activation(beta, embeddings, query) from dream_ops rather than manual W-space iteration. This gives pattern-space Hopfield dynamics matching the Lean proofs."
  - no_cma_es_needed: "CMA-ES was for hermes-memory's 6 arbitrary scoring weights. Coupled engine parameters are physics-derived from the Lean proofs — no optimization search space."

findings:
  - system_a_api: "hermes-memory engine: score_memory(params, MemoryState, time) → float. Uses weighted sum of relevance, recency, importance, activation. O(N) per query. ParameterSet has 12 params (6 CMA-ES tuned). File: proofs/hermes-memory/python/hermes_memory/engine.py"
  - system_b_api: "coupled_engine: query(embedding, beta, top_k) → list[dict]. Uses spreading_activation in pattern space. O(N·dim·iters) per query. dream() consolidates offline."
  - common_interface: "Both accept embeddings and return ranked results. Benchmark needs: (1) common embedding space, (2) shared scenario definition, (3) metrics: precision@k, latency, and quality-after-dream"

worked:
  - "Hebbian store: W += outer(emb, emb) with zero diagonal — simple, matches Hopfield theory"
  - "Using spreading_activation from dream_ops for query — reuses proven code"
  - "Orthogonal patterns for capacity tests — random patterns cause softmax saturation at moderate beta"

