findings:
  geometry_gap: |
    The separation gap between within-domain (0.46) and between-domain (0.36)
    is only 0.10. Synthetic tests had gap ~0.90. This is the fundamental
    challenge: the dream system must consolidate within-domain without
    crossing the narrow gap to between-domain merging.
  adaptive_threshold_position: |
    P70 merge threshold lands at 0.49. This is:
    - Well below paraphrases (0.85) — they WILL merge
    - Near varied same-topic (0.45) — some will merge, some won't
    - Above between-domain max (0.42) — cross-domain merge unlikely
    - The system should consolidate paraphrases aggressively, varied
      content moderately, and preserve domain boundaries. Testing this
      in Phase 3.
  cross_domain_bridging: |
    Only 20/50 cross-domain sentences are closer to their target domain
    than their own. The semantic bridging is real but not dominant.
    Mean gap (target - own) = -0.026. Cross-domain sentences stay
    primarily in their home domain while having moderate affinity to
    the related domain.

