decisions:
  - bridge2_no_current_time: |
      Adversarial review found that first_observed/last_updated from consolidation
      are already relative ages. Bridge 2 passes them DIRECTLY to MemoryState — no
      current_time subtraction. This was the critical design fix.
  - absolute_storage_relative_conversion: |
      StoredMemory stores absolute logical timestamps. _stored_to_memory_state() and
      _stored_to_candidate() compute current_time - stored_time for relative ages.
      advance_time(delta) validates delta >= 0.
  - atomic_store_path: |
      store() builds all mutations (deactivations, flagging, new memory) in local
      variables, then applies all at once. No partial corruption on exception.
  - consolidated_to_fixup: |
      After consolidation, orchestrator assigns UUID to new semantic memory, then
      fixes ArchivedMemory.consolidated_to via dataclasses.replace().
  - focused_adversarial_not_full_3pass: |
      Modules already went through 3-pass Brenner + cascade analysis. Orchestrator
      got 1 focused pass on integration boundary risks. Found the critical Bridge 2
      bug that would have produced nonsensical ages.

findings:
  - bridge2_time_chain: |
      The full time chain: orchestrator (absolute) → _stored_to_candidate (relative) →
      consolidate_memory passes candidate.creation_time (relative) → extract_semantic
      sets first_observed = min(source_creation_times) = relative. Bridge 2 receives
      relative ages, NOT absolute timestamps. Plan originally had current_time - first_observed
      which would produce absolute, but MemoryState expects relative. Fixed to direct pass.
  - jaccard_relevance_test_weakness: |
      Jaccard word-overlap relevance is very weak — many query tests had to use
      conditional assertions (if not gated). Added one unconditional test with
      high word overlap to ensure at least one query path is fully exercised.
  - reconsolidation_works: |
      Integration test confirms store → advance(50) → consolidate → advance(50) →
      consolidate again works. L2 memories can be further consolidated to L3 with
      correct provenance chain.

