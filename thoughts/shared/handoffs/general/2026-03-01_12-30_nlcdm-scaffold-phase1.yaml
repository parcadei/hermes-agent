  - smooth_weight_semantics: |
      W(s) > 0 for s >> τ_high (attractive) AND s << τ_low (amplifies negative sim).
      Repulsion comes from E_coupling = -½ W · norms, not from W being negative.
      This is correct behavior — verified empirically in Python tests.
  - lean_toolchain: "v4.29.0-rc2, same as V1 hermes-memory project"
  - div_lt_div_of_pos_left: |
      Used instead of div_lt_div_iff (not found in current Mathlib).
      Proof: 0 < 1 → 0 < (1+exp(-b)) → (1+exp(-b)) < (1+exp(-a)) → 1/(1+exp(-a)) < 1/(1+exp(-b))

findings:
