  - smooth_weight_repulsive_sign: |
      smooth_weight(params, -1.0) returns positive value (~1.0).
      This is correct: W(s) = s·σ(attractive) - s·σ(repulsive).
      For s=-1: attractive≈0, repulsive≈-1, W = 0-(-1) = +1.
      The energy formula E_coupling = -½W·norms makes this repulsive.

