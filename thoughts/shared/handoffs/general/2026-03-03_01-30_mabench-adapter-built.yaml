    files: [proofs/hermes-NLCDM/python/mabench/hermes_agent.py]
    details: |
      EmbeddingRelevanceScorer: Qwen3-0.6B cosine similarity, replaces JaccardRelevance
        via RelevanceScorer protocol. Caches embeddings per text string.
      HermesMemoryAgent: wraps MemoryOrchestrator (V1) + CoupledEngine (V2)
        - store: V1 text contradiction → orchestrator.store() + V2 embed → coupled_engine.store()
        - query: V2 spreading activation top-k + V1 text recall → merge/dedup → LLM answer
        - reset: clears both systems for new context
        - dream_interval: configurable dream cycle every N stores
      ParameterSet uses validated baseline: alpha=0.1, beta=0.1, delta_t=1.0,
        s_max=10.0, s0=1.0, temperature=5.0, novelty_start=0.5, etc.

