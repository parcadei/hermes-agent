decisions:
  adapter_not_subclass: |
    HermesMemoryAgent is NOT a subclass of MABench's AgentWrapper because
    AgentWrapper has heavy coupling to specific LLM clients (OpenAI, Anthropic,
    Google), tokenizers, and internal state. Our agent provides the same
    send_message(message, memorizing) interface without inheriting that baggage.
  dual_retrieval: |
    V2 (embedding-ranked via spreading activation) as primary retrieval,
    V1 (text-based recall with tiered rendering) as supplement. Merged with
    prefix-based deduplication. This gives both semantic relevance (V2) and
    text-heuristic matches (V1).
  adapter_in_nlcdm_tree: |
    MABench is a cloned repo with its own .git, so our adapter files live in
    proofs/hermes-NLCDM/python/mabench/ (our project tree). The runner adds
    MABench to sys.path at runtime.
  baseline_params: |
    Used validated ParameterSet from test_engine.py:make_baseline_params().
    Satisfies contraction condition K < 1. Previous attempt with custom params
    failed the contraction check.

findings:
  competency_mapping: |
    MABench 4 competencies vs our system:
    - AR (Accurate Retrieval): direct match — CoupledEngine.query() + P@1
    - TTL (Test-Time Learning): partial — our emotional tagging learns at ingest,
      not LLM in-context learning
    - LRU (Long-Range Understanding): weak — tests narrative comprehension,
      our bridges are geometric
    - CR (Conflict Resolution): DIRECT MATCH — our v2_contradiction system
  factconsolidation_format: |
    FactConsolidation has facts with serial numbers. Newer facts (higher serial)
    override older facts. Template: "find the newest fact with larger serial number"
    This directly tests contradiction-aware store's ability to replace old facts.
  v1_text_contradiction_gap: |
    V1 detect_contradictions didn't fire on "CEO of Acme is Alice" vs
    "CEO of Acme is now Bob Jones" — text heuristics may need tuning for
    this specific pattern. V2 cosine threshold would catch it if embeddings
    are close enough.

