      - All RAG agents use GPT-4o-mini as backbone
      - SubEM (Substring Exact Match) as eval metric

decisions:
  openrouter_not_direct: |
    Using OpenRouter instead of direct OpenAI/Anthropic APIs. Single API key,
    model-agnostic routing. OpenAI SDK compatible (just change base_url).
  gpt4o_mini_for_benchmark: |
    Switched from minimax/minimax-m2.5 to openai/gpt-4o-mini for benchmark
    compliance. Reasoning models can't work within 10-token output limit.
    GPT-4o-mini is the exact backbone used in the paper's baseline results.
  configurable_max_tokens: |
    Made max_gen_tokens a constructor param (default 10) so different models
    can use different budgets without code changes.

findings:
  reasoning_model_incompatibility: |
    MiniMax M2.5 (and likely other reasoning models like o4-mini, DeepSeek-R1)
    are incompatible with MABench's tight output token limits. They consume
    reasoning tokens that count toward completion_tokens but produce no content.
    Would need OpenRouter's reasoning token budget separation to work.
  published_baselines_for_factcon_sh: |
    From paper Table 2 (FactConsolidation-SH, 262K context):
    GPT-4o: 60%, HippoRAG-v2: 54%, BM25: 48%, GPT-4o-mini: 45%,
    GPT-4.1-mini: 36%, Gemini-2.0-Flash: 30%, Mem0: 18%, Cognee: 28%
    O4-mini on 6K: 100% (Table 4)
    Our run is on 6K context (max_test_samples=1), so compare against O4-mini 6K baseline.
  chunk_size_mismatch: |
    Paper uses chunk_size=512 for FactConsolidation but dataset config yaml
    says chunk_size=4096. The 6k config has context_max_length=6000.
    May need to override chunk_size in run_hermes.py for strict compliance.

