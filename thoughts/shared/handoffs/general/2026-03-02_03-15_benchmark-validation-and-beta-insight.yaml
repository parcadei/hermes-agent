findings:
  - beta_controls_capacity: "Capacity is exponential in β. β=5→N_max≈3, β=10→N_max≈75, β=20→N_max≈111K, β=50→N_max≈10^15. All in dim=64. The capacity cliff at β=5 is NOT classical Hopfield failure — it's the modern Hopfield capacity bound being hit at insufficient inverse temperature."
  - coherence_is_b_advantage: "Ambiguous queries (midpoint of 2 clusters): B coherence=1.0, A coherence=0.68. B's spreading_activation snaps to one attractor basin. A scores independently, returns a mix. This is B's structural advantage."
  - dream_doesnt_help_yet: "Dream doesn't extend capacity or improve temporal interference. Because dream_ops modify the Hebbian W matrix, which the query path (spreading_activation on pattern store X) doesn't use. The W matrix is vestigial."
  - w_matrix_is_vestigial: "Query uses spreading_activation(beta, embeddings, query) — pure softmax attention over pattern store. W matrix is only used by dream_ops (nrem_replay Hebbian update, rem_unlearn boltzmann_dynamics, rem_explore). Dream effects don't propagate to queries because queries never touch W."
  - beta_is_the_control_knob: "β trades capacity vs associativity. High β = exponential capacity, narrow basins, precise lookup. Low β = low capacity, broad basins, associative recall (mixtures). Dream cycles should modulate β, not W."
  - energy_identity_at_fixedpoints: "E(ξ) = -½‖ξ‖² + β⁻¹·Σp·log(p). Entropy ranges [-log(N), 0]. At high β, entropy term vanishes. At low β, spurious mixture states get massive penalty proportional to log(N)/β. REM-unlearn should exploit this gap."

