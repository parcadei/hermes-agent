findings:
  tldr_integration_map: |
    HERMES-MEMORY (V1 — proven dynamics, 0 production callers):
      orchestrator.py → encoding → contradiction → consolidation → recall
      core.py has: strength_decay, importance_update, soft_select,
                   novelty_bonus, steady_state_strength
      ALL have 0 callers from orchestrator or any production code.
      Only called by: markov_chain.py (simulation), engine.py (standalone sim)

    HERMES-NLCDM (V2 — Hopfield substrate + dream pipeline):
      CoupledEngine.dream() → dream_cycle_xb()
        → nrem_repulsion_xb → nrem_prune_xb → nrem_merge_xb
        → rem_unlearn_xb → rem_explore_cross_domain_xb
      CoupledEngine.query() → spreading_activation → hopfield_update
      Accepts: importances: np.ndarray  ← THIS IS THE BRIDGE SLOT
      Currently: importances defaults to 0.5 uniform (no decay signal)

  three_bridge_functions: |
    1. strength_decay(S₀, β_decay, t) → S(t)
       Source: hermes-memory/core.py — Lean proven in StrengthDecay.lean
       Target: importances parameter of dream_cycle_xb
       Property: Antitone in t (strength decreases over time)

    2. importance_update(base_importance, access_count, recency)
       Source: hermes-memory/core.py — uses clamp01
       Target: per-pattern importance driving prune/merge priority
       Property: Monotone in access_count, Antitone in time-since-access

    3. novelty_bonus(t, t_store)
       Source: hermes-memory/core.py — exploration window
       Target: new pattern importance at CoupledEngine.store() time
       Property: Antitone in (t - t_store) after initial window

  monotonicity_chain: |
    The composition claim to prove:

    time increases (Monotone)
    → strength_decay output decreases (Antitone — proven in StrengthDecay.lean: decay_antitone)
    → importance fed to dream decreases for old patterns (Antitone.comp_monotone)
    → dream prune preferentially removes low-importance (Monotone: lower importance → higher prune probability)
    → N decreases or stays same (Antitone in importance of weakest pattern)
    → capacity condition N < exp(βδ)/(4βM²) becomes easier (Monotone in N_max/N ratio)
    → system safety preserved (QED)

    Each link is either Monotone or Antitone with known composition rules.

  loogle_results: |
    From local Loogle (~/tools/loogle) confirmed against Mathlib:

    From Mathlib.Order.Monotone.Defs:
      1. Monotone.comp: Monotone g → Monotone f → Monotone (g ∘ f)
      2. Antitone.comp: Antitone g → Antitone f → Monotone (g ∘ f)
      3. Monotone.comp_antitone: Monotone g → Antitone f → Antitone (g ∘ f)
      4. Antitone.comp_monotone: Antitone g → Monotone f → Antitone (g ∘ f)

    From Mathlib.Analysis.Complex.Exponential:
      5. Real.exp_monotone: Monotone Real.exp

    For exp(-βt) antitone: compose Real.exp_monotone with Monotone.comp_antitone
    where f(t) = -βt is antitone for β>0. Or prove directly from exp_monotone + neg.

    Loogle binary: ~/tools/loogle/.lake/build/bin/loogle
    Usage: loogle [QUERY] or printf 'QUERY\n' | loogle -i
    Note: ~10s cold start per query (343MB index). Consider loogle-server for batching.

    Composition chain for the bridge theorem:
      Monotone(time) → Antitone(decay via exp(-βt)) → Monotone(importance_from_strength)
      → Antitone(prune_survival: lower imp → less survival) → Antitone(N)
      → Monotone(capacity_margin: fewer N → easier)
    Net: Antitone in time → capacity margin is non-decreasing.
    Use: alternating Antitone.comp_monotone / Monotone.comp_antitone.

