  - finset_sum_sub_distrib: "Finset.sum_sub_distrib doesn't unify directly with ∑ μ (Finset.univ sugar). Use 'rw [← Finset.sum_sub_distrib]' or 'simp_rw [Finset.sum_sub_distrib]' instead of bare term-mode."
  - finset_sum_comm_requires_mul_sum: "To swap ∑μ p·∑i f = ∑i ∑μ p·f, first distribute with simp_rw [Finset.mul_sum], then Finset.sum_comm."
  - let_bindings_block_rw: "Lean let bindings in theorem statements block rw/simp. Use 'intro c' to eliminate, or 'show' to manually state goal. hopfieldUpdate unfolds with lets that block set — use funext to equate."
  - sq_pos_of_ne_zero_signature: "sq_pos_of_ne_zero takes just the proof (h : x ≠ 0), not the value. Usage: sq_pos_of_ne_zero h, NOT sq_pos_of_ne_zero x h."
  - nlinarith_for_quadratic: "nlinarith can close quadratic goals that linarith cannot. Used for ½‖ξ-c‖² ≥ 0 expansion. Also need explicit hcc : Σ c*c = Σ c² bridge."
  - conv_ext_not_for_sums: "conv_lhs => ext x doesn't work on Finset.sum. Use simp_rw [show ∀ x, ... from ...] instead."
  - sum_mul_rewrite: "To rewrite inside a sum like ∑ x, p x * (f x * g) = ∑ x, (p x * f x) * g, use simp_rw [show ∀ x, ... from fun x => by ring] then rw [← Finset.sum_mul]."

