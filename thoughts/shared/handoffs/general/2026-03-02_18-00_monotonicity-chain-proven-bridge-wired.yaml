decisions:
  - separate_lake_restatement: "Restated strengthDecay in NLCDM rather than cross-importing from hermes-memory. The two are separate Lake projects; restating 3 lines of math is cleaner than a cross-project dependency."
  - abstract_middle_links: "Links 2-3 (importance monotone in strength, count monotone in importance) are hypotheses, not concrete proofs. These are stable architectural contracts — the specific formulas may change but monotonicity is invariant."
  - conservative_defaults: "decay_rate=0.01 active by default (negligible in tests with ms timescales), novelty_N0=0.0 off by default (additive, would change test behavior). Production code opts into novelty."
  - dynamic_importance: "Effective importance computed at dream time from base_importance + decay + novelty, not stored. Base importance updated on access via _importance_update."

