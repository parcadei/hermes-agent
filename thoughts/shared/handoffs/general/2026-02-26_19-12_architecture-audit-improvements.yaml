findings:
  - aiagent_god_object: "run_agent.py AIAgent has 30+ methods, 50+ fields — handles conversation loop, prompt assembly, compression, memory, tool execution, session persistence, trajectory saving, interrupt handling, delegation, logging. Primary decomposition target."
  - triple_session_storage: "Session data stored in 3 places: SessionDB (SQLite+FTS5 in hermes_state.py), SessionStore (JSON+SQLite in gateway/session.py), JSONL transcripts (gateway/mirror.py). Can drift out of sync."
  - circular_import: "model_tools.py ↔ tools/registry.py circular dependency — registry imports _run_async from model_tools. Works via Python import caching but fragile."
  - import_side_effect_registration: "_discover_tools() imports all tool modules to trigger registry.register() at module scope. Order-dependent, not statically analyzable, single broken module blocks all tools."
  - sync_async_friction: "AIAgent is sync, gateway is async. Bridge via _run_async() + ThreadPoolExecutor. Creates thread safety concerns with MemoryStore and SessionDB writes."
  - memory_substring_matching: "MemoryStore replace/remove use substring matching — fragile. No semantic search, no tagging. File-backed with § delimiters at ~/.hermes/memories/"
  - coarse_context_compression: "Compressor protects first 2 + last 4 messages, summarizes all middle messages into 800 tokens via aux LLM. No importance weighting or selective preservation."
  - regex_only_security: "_scan_memory_content() and _scan_context_content() use ~15 regex patterns. Trivially bypassable. skills_guard.py has LLM audit but memory/context don't."
  - duplicated_command_handling: "GatewayRunner._handle_message() re-implements slash commands separately from HermesCLI.process_command(). 9+ commands duplicated."
  - untyped_tool_results: "handle_function_call() returns string. No typed success/error distinction — LLM must read text to detect failures."

worked:
