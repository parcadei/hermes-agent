decisions:
  - cmaes_library: "Used cmaes (CyberAgentAILab) not pycma. Lighter, has SafeCMA for future use."
  - six_free_params: "w1, w2, w4, alpha, beta, temperature are optimized. w3 derived (1-w1-w2-w4). 7 insensitive params pinned at defaults."
  - scenario_approach_B: "Scenarios built once with PINNED defaults, reused across all candidates. Free params only affect scoring, not memory construction."
  - penalty_for_infeasible: "Return 1000.0 for infeasible candidates. CMA-ES handles this naturally — drives away from infeasible regions."
  - stability_80pct_threshold: "Memory wins >80% of 100 simulation steps = monopolization = stability failure. Uses rankings_per_step[i][0] as winner."
  - objective_weights: "60% static accuracy + 25% stability + 15% contraction margin bonus."

