questions:
  - "Encoding policy granularity: per-message classification or per-segment post-segmentation filtering?"
  - "Should encoding policy be LLM-based (expensive, accurate) or heuristic (cheap, less accurate)?"
  - "Does the encoding gate sit before Nemori's buffer (reject messages) or after segmentation (reject episodes)?"

decisions:
  - composed_scoring_constraint: "Extended contraction condition is K < 1 AND w_rec < 0.5. Balanced weights (none > 0.4) always preserve contraction."
  - two_population_dynamics: "Episodic and semantic memories get separate (alpha, beta) parameter regimes. Both satisfy contraction independently."
  - nemori_as_formation_layer: "Nemori handles memory formation (segment + narrate + predict-calibrate). Hermes dynamics handle post-formation behavior (decay, selection, novelty)."

findings:
  - nemori_no_encoding_gate: "Nemori stores EVERYTHING. No policy deciding whether to encode. Segmentation decides HOW to chunk, not WHETHER to store."
  - nemori_no_dynamics: "No R, S, decay, importance feedback, novelty bonus. SemanticMemory.confidence hardcoded 0.8-0.9, never used for ranking."
  - nemori_no_retrieval_integration: "search() returns raw dicts. No prompt injection, no context assembly. Caller's problem."
  - nemori_no_contradiction: "semantic_similarity_threshold=1.0 means dedup effectively disabled. Conflicting facts coexist."
  - nemori_no_compression: "No episodic-to-semantic aging. No offline consolidation. Episode merging only handles temporal duplicates."
  - predict_calibrate_works: "18.7% improvement over naive extraction. Core innovation worth keeping."
  - event_bus_extensible: "Nemori's EventBus (episode_created, episode_deleted) maps cleanly to dynamics — add memory_accessed event."

