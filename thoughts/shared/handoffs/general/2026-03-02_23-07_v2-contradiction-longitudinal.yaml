decisions:
  threshold_0_95: |
    Chosen because within-domain max cosine is 0.93. Threshold 0.95 gives zero
    false positives in normal ingestion. Only explicit contradiction patterns
    (value_alpha=0.20 -> cos ~0.97) exceed it.
  value_alpha_0_20: |
    Lowered from 0.32 (conflict resolution test) to 0.20 because threshold is
    higher (0.95 vs 0.85). cos = (1-α)/sqrt((1-α)²+α²) ≈ 0.97 at α=0.20.
  separate_rng: |
    contradiction_rng uses seed+8888 to avoid shifting main RNG state.
    Ingestion path still consumes main rng in same order as ingest_memories
    (domain-by-domain, pattern-by-pattern), but replacements change the patterns
    array, causing natural divergence from v2_coupled trajectory.

findings:
