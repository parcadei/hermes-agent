decisions:
  sentinel_none_for_importance: |
    store(importance=None) means "use emotional tagging". Explicit importance=0.5 bypasses it.
    This preserves backward compatibility — tests that pass explicit importance are unaffected.
    Alternative was emotional_tagging=False in test constructors, but sentinel is cleaner.
  S_min_0_3_as_default: |
    Chosen as initial default. Lean proof shows S_min must be > 0 (for bridgeDecay_pos).
    0.3 gives meaningful differentiation range [0.3, 1.0] but may be too aggressive —
    P@1 dropped from 0.94 to 0.67. Next step: sweep S_min values.
  linear_mapping: |
    S₀ = S_min + (1-S_min)*d is the simplest monotone mapping [0,1] → [S_min,1].
    Could use sigmoid or power law later, but linear is provably monotone and well-formed.

findings:
  emotional_tagging_works_but_needs_calibration: |
    Day 100 results (4 conditions):
    V2 emotional: 25 patterns, P@1=0.67, importance range 0.62, 171 REM assoc
