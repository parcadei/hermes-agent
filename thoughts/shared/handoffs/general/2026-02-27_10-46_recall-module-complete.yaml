decisions:
  - adaptive_k_gap_detection: "Sort composite scores, find largest gap, cut there + buffer B=2. Based on Taguchi et al. EMNLP 2025."
  - within_k_normalization: "Normalize scores within selected k memories for tier assignment, not across all. Prevents dilution from irrelevant memories."
  - positional_fallback: "When all k scores identical, distribute ceil(k/3) per tier instead of all-HIGH. AP1-F3."
  - demotion_before_drop: "Budget constraint demotes HIGH→MEDIUM→LOW before dropping any memory. Preserves existence signals."
  - empty_memories_before_gate: "recall() checks empty memories BEFORE gating. Empty DB with trivial message → gated=False, k=0 (not gated=True). AP1-F5."
  - budget_overflow_field: "RecallResult includes budget_overflow when min_k forces over-budget. Consumer must handle. AP1-F1."
  - chars_per_token_configurable: "Default 4 (English). Set to 2 for CJK/code-heavy content. AP2-F1."
  - top_slice_truncation: "adaptive_k truncates scores to [:max_k+buffer+1] before gap detection. Prevents O(n) degeneration on large pools. AP2-F3."
  - no_temperature_dependency: "Temperature only affects soft_select (dynamics), NOT score_memory. Spec's original temperature interaction section was wrong. AP3-E1."

findings:
  - temperature_false_premise: "CRITICAL: Temperature=4.9265 has ZERO effect on score_memory(). Only affects soft_select() in dynamics. Spec Section 7 completely rewritten."
  - budget_contradiction: "CRITICAL: min_k guarantee and budget<=total_budget are contradictory when min_k LOW memories exceed budget. Resolved with priority hierarchy + overflow field."
  - epsilon_fragility: "Minimum observed max_gap is 0.0102 (only 0.0002 above epsilon=0.01). Any weight change could push to constant fallback."
  - adaptive_k_bias: "Adaptive-k optimizes recall (never miss relevant) over precision (may include irrelevant). Mean k=6.3 with tuned params."
  - demotion_worthless_no_content: "MEDIUM→LOW demotion saves ~1 token when content=None. MIN_DEMOTION_SAVINGS_TOKENS=5 skips pointless demotions."
  - test_count_progression: "161 (initial) → 201 (post-adversarial) → 201 final. 560 total suite (encoding+optimizer+recall)."

