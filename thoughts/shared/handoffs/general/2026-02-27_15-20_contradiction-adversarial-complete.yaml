decisions:
  - decoupled_deactivation: "contradiction.py returns superseded_indices frozenset; it does NOT modify MemoryState or call into recall. Caller (memory store) sets active=False. Avoids AP1-F1."
  - category_thresholds: "Add per-category threshold dict to ContradictionConfig to resolve AP1-F3 (global 0.7 vs Section 7.3 per-category values)."
  - try_all_strategies: "Pipeline tries ALL applicable strategies per pair (not just first match). Highest-confidence wins. Fixes AP1-F12."
  - name_extractor_guard: "Add stop-word exclusion list for 'I'm X' pattern to prevent AP3-F2 (greedy name trap: 'I'm tired' → name=tired)."
  - value_containment_check: "VALUE_UPDATE checks substring containment before declaring different values. Fixes AP3-F4 (New York City vs New York)."
  - access_bonus_caller_responsibility: "inherited_access_bonus removed from resolve_contradictions(). Documented as caller concern. Fixes AP1-F2."
  - silent_pass_removal: "Remove all 'if result.has_contradiction:' guards from tests. Assert directly. Fixes AP2-F13."

findings:
  - greedy_name_trap: "CRITICAL: 'I'm tired' matches name extractor → name='tired'. Subject overlap 1.0 with any other 'I'm X'. Auto-supersedes unrelated statements. AP3-F2."
  - paraphrase_blindness: "CRITICAL: Regex extraction covers ~30-40% of syntactic variety. 'I'm a New Yorker' invisible to location extractor. AP3-F1. Accept for v1."
  - double_negative_misclass: "HIGH: 'I don't dislike Python' has 2 negative signals → NEGATIVE polarity. Actual meaning is positive. AP3-F5."
  - threshold_contradiction: "HIGH: Spec Section 7.3 says preference threshold=0.6 but Section 6.2 pipeline uses global 0.7. AP1-F3."
  - strategy_selection_narrow: "HIGH: Correction of a preference only tries DIRECT_NEGATION, never PREFERENCE_REVERSAL. AP1-F12."
  - silent_pass_antipattern: "CRITICAL: 8 tests use 'if has_contradiction:' guard that passes silently on false negatives. AP2-F13."
  - no_active_field: "CRITICAL: MemoryState has no active field. Spec Section 7.2 assumes it exists. AP1-F1."
  - test_count_baseline: "560 non-slow tests passing (encoding+optimizer+recall). test_contradiction.py adds 165 (will fail until module built)."

