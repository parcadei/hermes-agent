done_this_session:
  - task: "Full architectural review of V1 (hermes-memory) vs V2 (hermes-NLCDM)"
    details: |
      V1 (hermes-memory): 6 Lean proof files. Hopfield-inspired but actually a
      classical scoring/dynamics system. Core: multi-signal scoring
      score = w₁·relevance + w₂·recency + w₃·importance + w₄·σ(activity)
      with proven contraction mapping (ComposedSystem.lean, ContractionWiring.lean).
      Strength decay, novelty bonus, soft selection — all proven antitone/Lipschitz.

      V2 (hermes-NLCDM): 21 Lean proof files. Nonlinear coupled dynamical memory.
      Core: Hopfield energy wells, smooth coupling weight function, dream cycle
      (NREM-replay, REM-unlearn, REM-explore). Exponential capacity theorem
      N_max ~ exp(βδ)/(4βM²). Spurious state characterization, energy gap proofs.

      Key finding: spreading activation was disabled and replaced with direct
      cosine because at N>100 patterns, converged state gives uniform ~0.83 scores.
      This is NOT a bug in the theory — the capacity theorem requires δ-separation
      between patterns, and MABench facts about the same entity are near-duplicates
      in embedding space (>0.9 cosine similarity).

  - task: "Identified pipeline design flaw"
    files: [proofs/hermes-NLCDM/python/mabench/hermes_agent.py]
    details: |
      Current wiring in _query() (hermes_agent.py:308-346):
        1. V2 cosine retrieval = PRIMARY (coupled_engine.query() top-k)
        2. V1 text-based recall = SUPPLEMENT (appended if not in V2 results)

      Problem: V1's multi-signal scoring (relevance, recency, importance, activity)
      is the formally-verified ranking system with proven convergence. But it's
      being used as a backup, not the primary ranker. Meanwhile V2 uses a crude
      manual recency hack: score *= (1 + α·normalized_recency).

      V2 reinvented a worse version of what V1 already provides with formal guarantees.

  - task: "Identified correct hybrid architecture"
    details: |
      The two systems should handle different concerns:
        V2 (NLCDM): Storage + maintenance + embedding retrieval + dream consolidation
        V1 (hermes-memory): Scoring + ranking + multi-signal re-ranking

      Correct pipeline: V2 retrieves candidates → V1 re-ranks using full scoring.
      This is the standard dense-retrieval → learned-reranker pattern, except
      the reranker has formal convergence guarantees.

      The dream cycle's value isn't retrieval improvement — it's long-term memory
      health (consolidation, pruning, cross-domain association). MABench doesn't
      test this because it's a single-session ingest-then-query benchmark.

decisions:
  pipeline_flip: |
    Switch from "parallel retrievers merged" to "V2 retrieve → V1 re-rank".
    V2 cosine retrieval finds candidate facts. V1 scoring ranks them using
    all four signals. This leverages each system's strengths.
  spreading_activation_analysis: |
    Spreading activation failed at N>100 because MABench facts violate the
    δ-separation precondition of the capacity theorem. Facts about the same
    entity are near-duplicates in embedding space. This is the correct
    theoretical explanation — the proofs are sound, the data violates preconditions.
  dream_cycle_role: |
    Dream cycle is NOT for retrieval improvement. It's for memory maintenance:
    consolidation, spurious state cleanup, cross-domain association discovery.
    MABench doesn't test any of these. Need a different benchmark to validate
    the Hopfield/dream architecture (multi-session, cross-domain, partial cues).

findings:
  v1_vs_v2_capabilities: |
    V1 (hermes-memory):
      - 6 Lean proofs: StrengthDecay, MemoryDynamics, SoftSelection, NoveltyBonus,
        ComposedSystem, ContractionWiring
      - Runtime: orchestrator with encoding, contradiction, consolidation, recall
      - Strength: multi-signal ranking with formal convergence

    V2 (hermes-NLCDM):
      - 21 Lean proofs: Energy, Capacity, SpuriousStates, EnergyGap, Lyapunov,
        BridgeFormation, TransferDynamics, EmotionalTagging, etc.
      - Runtime: CoupledEngine with dream cycle (NREM/REM/explore)
      - Strength: energy-based storage, dream consolidation, exponential capacity

    Neither system is "better" — they solve different problems.
    V1 = ranking. V2 = dynamics. Current benchmark only tests ranking.

  what_v2_actually_contributes_at_runtime: |
    At query time, V2 contributes:
      1. Cosine retrieval (standard RAG — not uniquely Hopfield)
      2. Recency weighting (simple multiplier)
      3. Contradiction detection at store time (cosine threshold)
    The dream cycle, energy wells, capacity theorems — none are in the retrieval path.

  spreading_activation_failure_cause: |
    The capacity theorem (Capacity.lean) requires:
      4NβM² ≤ exp(βδ) where δ = separation between patterns
    MABench facts: "14907. Alice speed 42" vs "14908. Alice speed 45"
    have cosine similarity >0.9 → δ ≈ 0.1 → exponential term is tiny.
    Spreading activation correctly converges to a mixture (convex combination
    of near-identical patterns), giving uniform scores. This is mathematically
    correct behavior — the data doesn't meet the theorem's preconditions.

