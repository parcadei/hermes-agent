decisions:
  - strength_decay_model: "dS/dt = -beta*S between events, solution S(t) = S0*exp(-beta*t). Combined with access update gives affine contraction map."
  - combined_dynamics: "S_{n+1} = (1-alpha)*exp(-beta*Delta)*S_n + alpha*Smax — contraction factor gamma = (1-alpha)*exp(-beta*Delta) in (0,1)"
  - steady_state_formula: "S* = alpha*Smax / (1 - (1-alpha)*exp(-beta*Delta)) — proved S* < Smax (anti-lock-in) and S* is fixpoint"
  - soft_selection_via_sigmoid: "P(select A over B) = sigma((s1-s2)/T) — reuses sigmoid from MemoryDynamics, proved monotonicity and complementarity"
  - novelty_bonus_design: "N(t) = N0*exp(-gamma*t) — decaying bonus added to score. Exploration window W = ln(N0/epsilon)/gamma"
  - unused_hypotheses_as_underscores: "Some theorem parameters (like ht0, hεN in noveltyBonus_above_threshold) are needed for the theorem statement's mathematical meaning but not used in the proof body — use _ prefix"

findings:
  - field_simp_ring_failure: "field_simp followed by ring can fail when field_simp introduces Nat.rawCast terms. Workaround: manual calc chain with mul_right_cancel0 and div_mul_cancel0"
  - exp_eq_one_iff_missing: "exp_eq_one_iff doesn't exist in this Mathlib. Use exp_le_exp in both directions + exp_zero rewrite to prove exp(x) != 1"
  - div_lt_iff_missing: "div_lt_iff doesn't exist. Use lt_of_mul_lt_mul_right with the positive denominator after establishing (a/d)*d < b*d via field_simp+linarith"
  - log_pos_iff_expects_nonneg: "Real.log_pos_iff expects 0 <= x (not 0 < x). Use .le on a strict positivity proof"
  - norm_num_for_arithmetic: "simp can't close 1+1=2 in sigmoid_at_zero. Need norm_num after simp for concrete arithmetic"
  - explicit_implicit_args: "When Lean can't infer implicit args (e.g., gamma in noveltyBonus_pos), use @ for explicit application"
  - rfl_for_definitional_equality: "have hcf : combinedFactor a b d = (1-a)*exp(-b*d) := rfl works when the equation is definitional. Don't use 'by unfold; rfl' which sometimes leaves goals open"

