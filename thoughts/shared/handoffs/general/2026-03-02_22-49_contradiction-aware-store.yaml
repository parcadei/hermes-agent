      c. Test with CoupledEngine directly in a separate longitudinal-style test

      The longitudinal eval uses its own numpy arrays, not CoupledEngine.
      To test contradiction_aware in longitudinal context, either:
      - Modify run_longitudinal_eval to use CoupledEngine for ingestion, or
      - Create a new CoupledEngine-based longitudinal test (simpler, cleaner)

