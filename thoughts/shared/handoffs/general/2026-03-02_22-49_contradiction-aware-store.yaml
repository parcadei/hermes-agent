decisions:
  opt_in_contradiction: |
    contradiction_aware defaults to False. Existing code paths unaffected.
    Only TestConflictResolution enables it. This prevents the regression in
    test_old_memories_pruned_more_than_fresh (which stores 10 tightly-clustered
    patterns with spread=0.05 → cos~0.997, would be falsely replaced at 0.85).
  threshold_0_85: |
    Chosen to match synthetic geometry: cos(original, update) ≈ 0.90 with
    value_alpha=0.32. Needs calibration against real embeddings (Qwen3-0.6B)
    where "CEO of Acme is Alice" vs "CEO of Acme is Bob" might be 0.80-0.95.

findings:
  repulsion_partial_resolution: |
    Without contradiction-aware store, nrem_repulsion_xb provides ~60% conflict
    resolution via importance asymmetry (aged originals are movable, fresh updates
    are anchored). But direction depends on centroid-original-update triangle
    geometry — 4/10 topics fail because repulsion pushes original CLOSER to centroid.
  reconsolidation_zero_effect: |
    Reconsolidation (η=0.01 and η=0.1) had identical results to V2 Coupled.
    It fires during query AFTER scoring, so single final queries have no effect.
    Wake queries don't help either — importance boost doesn't affect scoring,
    and pattern migration toward own embedding is near-no-op.
  dream_cycle_xb_limitations: |
    Fixed thresholds prevent conflict resolution:
    - nrem_prune_xb threshold=0.95: doesn't fire on 0.90-similar pairs
    - nrem_merge_xb min_group=3: doesn't fire on pairs (size 2)
    dream_cycle_v2 has adaptive thresholds that might help, but CoupledEngine uses xb.
  importance_not_in_scoring: |
    CoupledEngine.query() scores by cosine similarity only. Importance affects
    dream pruning but NOT query ranking. This limits importance-based conflict
    resolution to dream-time mechanisms.

