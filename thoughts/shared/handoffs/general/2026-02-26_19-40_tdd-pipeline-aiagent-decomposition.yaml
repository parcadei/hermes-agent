decisions:
  - decomposition_revised: "4 classes → 2 classes + 1 function. CompressionManager dropped (34 lines, zero state, 5 callbacks = worse than inline). ToolExecutor becomes module-level function with frozen dataclass config (zero mutable state)."
  - final_components: "PromptAssembler (class, owns cache), SessionPersister (class, owns session_id + DB), execute_tool_calls() (function + ToolExecConfig dataclass), _compress_context stays on AIAgent"
  - circular_import_fix: "Extract _run_async to agent/async_bridge.py — both model_tools.py and tools/registry.py import from shared module"
  - eager_import_fix: "Gut tools/__init__.py to empty docstring — 17 eager imports redundant with model_tools._discover_tools() lazy loading"

findings:
  - coverage_baseline: "12% across 8 targets. run_agent.py at 6% (85/1329 stmts). hermes_state.py at 0%. tools/registry.py best at 69%. Only 13 tests touch refactor target code."
  - preexisting_bug: "After compression, session_id updates but session_log_file does NOT (run_agent.py:1384). SessionPersister fixes this automatically via property setter."
  - clarify_mismatch: "model_tools._AGENT_LOOP_TOOLS has 4 members but _execute_tool_calls handles 5 inline (including clarify). Flagged independently by Pass 1 and Pass 2."
  - on_tool_executed_missing: "Nudge counter resets (_turns_since_memory, _iters_since_skill) have no mechanism in extracted interface. Flagged by Pass 1 and Pass 3."
  - ashby_gap: "run_conversation has 15 code paths. Decomposition addresses only 3. Remaining 12 stay monolithic. Future Phase 6 needed."
  - json_log_on2: "SessionPersister writes full JSON after every tool iteration = O(N^2). Mitigated with save_interval parameter."
  - vacuous_test: "Proposed circular import test (python -c 'from tools.registry import registry') already passes today. Need structural assertion instead."
  - flush_cost: "flush_memories sends full conversation (~100K tokens) to main model. ~$1.50 per compression event at Opus pricing."

