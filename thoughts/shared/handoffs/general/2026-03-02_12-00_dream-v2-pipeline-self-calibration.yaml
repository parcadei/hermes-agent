findings:
  threshold_geometry_mismatch: |
    The single most important finding. Fixed merge threshold (0.90) + repulsion
    before merge = no consolidation at production geometry. The system was a
    glorified append-only list. One parameter (relative to embedding geometry)
    determines whether the system produces hierarchical abstraction or nothing.
  pipeline_order_matters: |
    Repulsion before merge is like spreading papers across a desk then trying
    to sort piles. You can't find the piles because you scattered them.
    Merge first, then repulse. The neuroscience had it right (early NREM
    consolidation, late NREM downscaling).
  self_calibration_works: |
    v2 with adaptive thresholds eliminates configuration sensitivity.
    The system measures its own geometry and sets thresholds from the
    distribution. Works at any dimension, any spread, any embedding model.
  gen_depth_30_in_30_days: |
    With v2, the system reaches gen-30 abstraction depth in 30 days.
    This is one generation per day — each dream cycle merges the freshest
    gen-0 patterns into higher-gen representations. The generation counter
    is less meaningful than the generation DISTRIBUTION (how many at each level).

