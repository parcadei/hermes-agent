findings:
  scale_timing: |
    Store 10k: 0.01s. Query: fast.
    nrem_prune 10k: 117s (O(N²) Python for-loops, 50M pair checks).
    dream_cycle_xb 10k: 469s (~8min). Bottleneck is prune + repulsion.
    Strength decay 10k: 0.04ms vectorized. Steady state convergence: 0.8ms.
  zero_pruning_at_scale: |
    0 patterns pruned or merged at any scale (1k/5k/10k). The HF dataset
    sentences are genuinely diverse — max pairwise cosine = 0.65, well below
    prune threshold (0.95) and merge threshold (0.90). This validates that
    pruning/merging activate only for actual near-duplicates, not false positives.
  real_geometry: |
    δ_min (sampled) = 0.35-0.42. Max cosine = 0.58-0.65.
    Capacity formula N_max = exp(5 × 0.42) / (4 × 5 × 1) = 0.4 patterns.
    10k patterns is massively overcapacity for exact retrieval.
    Dreams are ESSENTIAL to reduce N for viable retrieval.
  streaming_insight: |
    User insight: 10k-at-once is unrealistic worst case. Production pipeline
    is incremental: memories arrive ~100/day, dreams consolidate nightly,
    working set stays bounded. The interesting test is streaming 170k over
    1700 simulated days — ingested grows linearly, surviving plateaus.
  o_n_squared_bottleneck: |
    nrem_prune_xb (dream_ops.py:935-952) uses Python for-loops over all N²
    pairs. Fix: compute similarity matrix via BLAS (patterns @ patterns.T)
    in one call. Would turn 117s → ~1s at 10k. Same for nrem_repulsion_xb.

