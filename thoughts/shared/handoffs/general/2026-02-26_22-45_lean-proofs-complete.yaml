  - field_simp_for_division: "field_simp is the most reliable way to clear denominators in Lean, then nlinarith/linarith for the polynomial arithmetic"

worked:
  - "le_of_mul_le_mul_right for division inequalities — multiply both sides by positive denominator product, use field_simp to verify equalities, nlinarith for the resulting polynomial"
