    simp_rw applies ALL rewrites exhaustively. If one rewrite (like <- Finset.mul_sum)
    succeeds once and can't apply again, simp_rw errors with "no progress".
    Fix: use simp_rw for under-binder rewrites, then rw for structural ones.

