    Insert after line 1747 (after nrem_merge_xb returns X3):
      S = X3 @ X3.T  # Precompute similarity matrix — shared across REM ops

    Then modify line 1760 call to rem_unlearn_xb to pass S:
      X4 = rem_unlearn_xb(X3, beta, similarity_matrix=S, n_probes=200, separation_rate=0.02, rng=rng)

    PRESERVE: All existing parameters and return values. S is optional (backward compat).

  build_step_2_replace_unlearn: |
    FILE: proofs/hermes-NLCDM/python/dream_ops.py
    FUNCTION: rem_unlearn_xb (lines 626-724)
    CHANGE: Add optional `similarity_matrix` parameter. When provided, skip MC probing entirely.
    Use direct S-based pair analysis instead.

    New signature:
      def rem_unlearn_xb(patterns, beta, beta_unlearn=None, n_probes=200,
                         separation_rate=0.02, rng=None, similarity_matrix=None):

    New logic when similarity_matrix is not None:
      S = similarity_matrix.copy()
      np.fill_diagonal(S, -2.0)
      max_sim = np.max(S)
      if max_sim <= 0.70:  # fast-path: no close pairs
          return patterns.copy()
      close_i, close_j = np.where(np.triu(S, k=1) > 0.70)
      X = patterns.copy()
      for idx in range(len(close_i)):
          i, j = close_i[idx], close_j[idx]
          diff = X[i] - X[j]
          norm = np.linalg.norm(diff)
          if norm > 1e-8:
              direction = diff / norm
              intensity = min((similarity_matrix[i, j] - 0.70) / 0.30, 1.0)
              step = separation_rate * intensity
              X[i] += step * direction
              X[j] -= step * direction
              X[i] /= np.linalg.norm(X[i])
              X[j] /= np.linalg.norm(X[j])
      return X

    When similarity_matrix is None: keep existing MC probing code unchanged (backward compat).
    PRESERVE: Function docstring, all contracts. Input patterns NOT mutated.

  build_step_3_batch_explore: |
    FILE: proofs/hermes-NLCDM/python/dream_ops.py
    FUNCTION: rem_explore_cross_domain_xb (lines 1135-1281)
    CHANGE: Replace the inner K=10 perturbation loop (lines 1226-1246) with batched matmuls.

    Replace lines 1223-1246 (the responses_i/responses_j loop) with:
      deltas = rng.standard_normal((K, patterns.shape[1]))
      deltas /= np.linalg.norm(deltas, axis=1, keepdims=True)

      qi_batch = xi[np.newaxis, :] + epsilon * deltas  # (K, d)
      qi_norms = np.linalg.norm(qi_batch, axis=1, keepdims=True)
      qi_batch = np.where(qi_norms > 1e-12, qi_batch / qi_norms, qi_batch)

      qj_batch = xj[np.newaxis, :] + epsilon * deltas
      qj_norms = np.linalg.norm(qj_batch, axis=1, keepdims=True)
      qj_batch = np.where(qj_norms > 1e-12, qj_batch / qj_norms, qj_batch)

      ri_stack = (patterns @ qi_batch.T).T  # (K, N)
      rj_stack = (patterns @ qj_batch.T).T  # (K, N)

    Then lines 1249-1250 (np.array(responses_i/j)) become unnecessary — ri_stack/rj_stack
    are already (K, N) numpy arrays. Rest of correlation code stays the same.
    PRESERVE: All contracts X1-X6. Deterministic with same seed.
