decisions:
  fact_level_parsing: |
    Split chunks into individual facts at store time. Same principle as Mem0
    (LLM-based extraction) and Cognee (knowledge graph). We use regex on the
    numbered list format. Domain-agnostic: any numbered list gets parsed.
  direct_cosine_over_spreading_activation: |
    Spreading activation loses discriminative power at N>100 patterns.
    The converged state becomes a weighted average, giving uniform scores.
    Direct cosine is standard RAG and works correctly at any scale.
  ingestion_order_recency: |
    Use self._store_count (ingestion order) as recency, not parsed SN.
    Domain-agnostic: in production you'd use timestamps. Correlates perfectly
    with SN in this benchmark. Alpha=0.1 default.

findings:
  6k_results_with_fact_parsing: |
    | Config                              | SubEM |
    |-------------------------------------|-------|
    | Hermes fact-level + SN prompt (v1)  |   94% |  <- benchmark-specific prompt
    | Hermes fact-level + KP prompt (v2)  |   75% |  <- domain-agnostic prompt
    | Paper: GPT-4o (long-context 6K)     |   92% |
    | GPT-4o-mini fullpass (no memory)    |   85% |
    | Hermes chunk-level (previous)       |   79% |
    | Hermes fact-level no SN (v3)        |   69% |  <- stripped SN from text
  prompt_fairness_analysis: |
    94% version used SN-specific system prompt + [SN...] tags in stored text.
    75% version uses generic system prompt + preserves original "N. fact" format.
    69% version stripped serial numbers entirely from stored text.
    The MABench query already contains SN instructions. Preserving original text
    format (including "14907. fact") is legitimate. The gap is in system prompt.
  262k_chunk_level_baseline: |
    33% SubEM with chunk-level storage (previous session).
    Paper baselines: GPT-4o=60%, HippoRAG-v2=54%, BM25=48%,
    GPT-4o-mini=45%, GPT-4.1-mini=36%.
  embedding_cost: |
    18K facts × 83ms/embedding = ~25 min. O(N²) contradiction checks add
    seconds. Now cached to disk after first run.

