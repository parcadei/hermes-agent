decisions:
  emotional_tagging_parked: |
    CMA-ES proves prediction-error S₀ has a fundamental P@1 ceiling at ~0.87.
    The mechanism that stores redundant patterns cold (good for differentiation)
    also thins cluster density (bad for retrieval). Two implementations, 900+ evals,
    same ceiling. The tradeoff is architectural, not parametric.
  neuroscience_analogy_wrong: |
    The amygdala tags based on emotional valence (external signal), not prediction
    error from existing memories (self-referential geometry). Autonomous geometric
    tagging doesn't work. Would need agent-in-the-loop importance labels instead.
  reconsolidation_is_safe: |
    ξ → ξ + η(q - ξ) on retrieval. Only strengthens patterns through use.
    Nothing gets starved. P@1 should improve because patterns migrate toward
    actual query distribution. Low risk, high impact for MemoryAgentBench.
  predictive_coding_needs_diagnostic: |
    Stores only residual (part not reconstructable from abstractions).
    Geometrically similar to emotional tagging — deprioritizes patterns near
    cluster centers. May hit same wall. MUST run viability diagnostic first:
    artificially remove 30% of patterns closest to centroids, measure P@1.
    If P@1 drops significantly, predictive coding is unsafe.

findings:
  p1_ceiling_0_8667: |
    Best P@1 across 900+ evaluations: 0.8667 (vs V2 coupled 0.938).
    No combination of S_min, power-law steepness, or access-refresh boost
    can close this gap. The ceiling is structural.
  best_objective_0_9299: |
    Best objective (P@1 + 0.3·imp_std) was 0.9299, achieved by maximizing
    imp_std while accepting P@1 ~0.87. The optimizer correctly found the
    tradeoff boundary but couldn't push P@1 past it.
  sigma_behavior_confirms_infeasibility: |
    CMA-ES sigma expanded (exploration) then contracted (convergence on boundary)
    without ever finding a feasible point. Axis ratio reached 48:1 in the second
    run — maximum search ellipsoid distortion. The feasible region doesn't exist.

