decisions:
  realistic_centroids_critical: |
    Orthogonal centroids (QR decomposition via make_separated_centroids) produce zero cross-domain
    similarity → zero REM associations → zero bridges. Real Qwen3-0.6B embeddings show inter-domain
    cosine of 0.15-0.40. Switched to make_realistic_centroids() mixing shared + specific components.
    alpha = sqrt(0.20) shared direction + sqrt(0.80) domain-specific = target mean cosine ~0.20.
  access_refresh_essential: |
    Without simulated queries, V2 decay uniformly punishes ALL old patterns → P@1 drops to 0.27
    at day 100 (vs V1's 0.82). With 5 random queries/day refreshing last_access_day, V2 P@1
    rises to 0.94 — BETTER than V1. Decay + access-refresh = selective forgetting (the point).
  associations_vs_bridges_distinction: |
    REM-explore returns associations (report.associations: list[tuple[int,int,float]]) — pairs
    found via perturbation-response correlation. These are NOT the same as "cross-domain merged
    patterns" (is_cross_domain in PatternMeta, set when merge combines different-domain patterns).
    The eval now tracks both separately. Merge bridges = 0 in all conditions (patterns too spread
    for merge threshold), but REM associations = 202 (V2) / 74 (V1).
  day_scale_decay_calibration: |
    Initial attempt used seconds (decay_rate=0.001 * 86400s/day = exp(-86.4) per day ≈ 0).
    Fixed to day-scale: decay_rate=0.03/day → half-life 23 days. Novelty_gamma=0.1 → ~10 day novelty window.

findings:
  v2_decisively_better: |
    Day 100 results with realistic centroids:
    V2: 26 patterns, P@1=0.94, 202 REM associations, importance range 0.53
    V1: 33 patterns, P@1=0.39, 74 REM associations, importance range 0.28
    Baseline: 2179 patterns, P@1=0.003, 0 associations
    V2 wins on ALL metrics: fewer patterns, higher retrieval, more associations.
  v2_rem_advantage_mechanism: |
    V2 discovers 2.7x more REM associations than V1 because:
    1. Novelty bonus protects fresh cross-domain patterns during pruning
    2. Access-refresh preserves high-value patterns across domains
    3. Smaller, higher-quality store (26 vs 33) means less noise during perturbation-response
  pattern_trajectory: |
    Baseline: monotonic growth 25→2179 (+22/day)
    V1: stabilizes at ~30 (fluctuates 26-34)
    V2: stabilizes at ~25 (fluctuates 22-27, slightly more aggressive consolidation)

