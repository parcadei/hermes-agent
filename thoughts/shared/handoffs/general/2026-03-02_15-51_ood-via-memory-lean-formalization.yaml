architecture_notes: |
  Two-system architecture for memory:

  System A (hermes-memory/): Scalar dynamics — strength, importance, decay, selection.
    Key: strength_decay(β, Δt) = e^(-βΔt). Patterns die if not reinforced.
    Lean proofs in proofs/hermes-memory/ (separate lakefile).

  System B (hermes-NLCDM/): Vector dynamics — patterns on S^{d-1}, Hopfield energy, dream ops.
    Key: localEnergy(ξ) = -lse(β, X^Tξ) + ½‖ξ‖². Dream cycle curates X.
    Lean proofs in proofs/hermes-NLCDM/ (this project).

  The OOD-via-memory claim spans BOTH systems:
    - System B creates trace centroids (energy wells) and discovers bridges (dream explore)
    - System A's strength decay can kill traces before they consolidate
    - The conditional monotonicity theorem must account for both

  Dream pipeline order (dream_cycle_xb):
    1. nrem_repulsion_xb — push close pairs apart (η=0.01, min_sep=0.3)
    2. nrem_prune_xb — delete near-duplicates (threshold=0.95, keeps higher importance)
    3. nrem_merge_xb — merge similar groups into centroids (threshold=0.90, min_group=3)
    4. rem_unlearn_xb — destabilize mixture states (S-based fast path)
    5. rem_explore_cross_domain_xb — discover cross-domain associations (read-only)

  Destructive ops that can break bridges:
    - Prune: deletes low-importance member of near-duplicate pair → bridge endpoint gone
    - Strength decay (System A): kills unmaintained traces → bridge endpoint gone

  Bridge-preserving ops:
    - Merge: centroid inherits similarity (sqNorm_mean_ge_of_pairwise) → bridges survive
    - Repulsion: moves patterns but preserves identity → bridges shift but persist
    - Unlearn: pushes apart mixture-formers, doesn't delete → bridges persist if not mixture
