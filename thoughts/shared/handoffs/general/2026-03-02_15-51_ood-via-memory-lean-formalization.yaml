    details: |
      Definitions needed:
        - SimilarityMatrix (cfg : SystemConfig d N) : Fin N → Fin N → ℝ := fun μ ν => Σ_i patterns μ i * patterns ν i
        - Bridge (S : SimilarityMatrix) (τ : ℝ) (μ ν : Fin N) : Prop := S μ ν ≥ τ ∧ μ ≠ ν
        - BridgeCount (S) (τ) : ℕ := #{(μ,ν) | Bridge S τ μ ν}
      Key theorem: bridge_formation_from_centroid
        If c = normalize(α·x_s + (1-α)·x_t + noise) and ⟨c, x_s⟩ ≥ τ and ⟨c, x_t⟩ ≥ τ,
        then adding c to the pattern store creates ≥2 new bridges (c↔x_s and c↔x_t).
