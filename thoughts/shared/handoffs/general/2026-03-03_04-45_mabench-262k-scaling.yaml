decisions:
  chunk_size_4096_better_at_6k: |
    Paper says 512 but 4096 works better at 6K. With only 2 chunks, serial number
    ordering is preserved within chunks. With 12 small chunks, embedding-ranked
    retrieval scrambles the order. May revisit at 262K.
  no_emotional_tagging: |
    User confirmed: 900+ CMA-ES evaluations proved emotional tagging caps P@1 at 0.87.
    Keep OFF.
  gpt41_mini_for_262k: |
    GPT-4o-mini context window (128K) can't handle 262K fullpass.
    GPT-4.1-mini has 1M window. Paper reports GPT-4.1-mini at 262K = 36% SubEM.

findings:
  6k_results_table: |
    | Config                              | SubEM |
    |-------------------------------------|-------|
    | GPT-4o-mini fullpass (no memory)    |   85% |
    | Hermes full pipeline (dream=1)      |   79% |
    | Hermes baseline (no dream)          |   76% |
    | chunk_size=512, retrieve=20         |   64% |
    | chunk_size=512, retrieve=10         |   52% |
  paper_baselines: |
    6K: GPT-4o=92%, O4-mini=100% (Table 4, long-context only)
    262K (Table 2): GPT-4o=60%, HippoRAG-v2=54%, BM25=48%,
    GPT-4o-mini=45%, GPT-4.1-mini=36%, Gemini-2.0-Flash=30%,
    Cognee=28%, Mem0=18%
  memory_hurts_at_6k: |
    At 6K the memory system loses 6 points vs fullpass (79% vs 85%).
    Expected: context is trivially small, memory adds prompt noise.
    The value proposition is at 262K where long-context models degrade.
  failure_pattern: |
    All failures are parametric knowledge override — LLM sees both old and
    new facts but picks the real-world answer. Dream cycle fixed 3/24.

