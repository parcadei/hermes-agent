decisions:
  rng_isolation: |
    Reconsolidation perturbations use separate recon_rng to avoid shifting main RNG state.
    Critical for fair comparison: conditions must share identical random trajectory except
    for the mechanism being tested.
  eta_0_01_validated: |
    η=0.01 is safe — per-step drift 0.000025, P@1 identical to V2 coupled.
    But the simulation can't measure reconsolidation benefit because synthetic queries
    are too similar to stored patterns. Real benefit requires real query distribution.
  predictive_coding_viable: |
    Removing 30% patterns closest to centroids causes only 1.4% P@1 drop.
    Unlike emotional tagging (which autonomously deprioritizes via prediction error),
    predictive coding only stores residuals — the mechanism is different enough
    that the cluster thinning problem doesn't apply at 30% removal.

findings:
  rng_divergence_pitfall: |
    Any extra rng.standard_normal() call inside a condition loop shifts every
    subsequent random draw. In a 100-day simulation with ~10 rng calls per day,
    a single extra call on day 1 makes day 2+ completely different. This produced
    a convincing-looking "reconsolidation failure" that was entirely an RNG artifact.
    ALWAYS use separate RNG streams for condition-specific stochastic operations.
  reconsolidation_unmeasurable_in_simulation: |
    With synthetic queries (pattern + 0.02 noise), reconsolidation shift is
    η * 0.02 = 0.0002 per retrieval. Over 50 retrievals: 0.01 total drift.
    On unit sphere with inter-pattern separation ~0.10, this is 10% of the gap
    but in a random direction (noise-driven), not toward a stable query centroid.
    Need queries with systematic bias (e.g., user always retrieves pattern X
    but with slight topic drift) to measure reconsolidation benefit.
  emotional_tagging_confirmed_real: |
    RNG bug was reconsolidation-specific. Emotional tagging results are unaffected.
    CMA-ES P@1 ceiling at 0.87 and longitudinal P@1=0.667 are both legitimate.

