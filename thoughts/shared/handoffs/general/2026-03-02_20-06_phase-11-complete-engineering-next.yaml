decisions:
  - finite_sample_not_measure_theory: |
      Used finite-sample algebraic covariance (centeredCov over Fin K → ℝ) instead of
      Mathlib's measure-theoretic ProbabilityTheory.covariance. Avoids needing MeasureSpace,
      keeps proofs algebraic and tractable. The standard basis witness (K=d, δ_k = e_k) gives
      exact Gram matrix recovery.
  - no_let_bindings_in_theorem_types: |
      Lean4 rw tactic cannot match through let-bindings in hypothesis types.
      All theorem signatures use fully expanded inline expressions (verbose but works).
      Learned: never use `let` in theorem conclusion or hypothesis types when the hypothesis
      will be rewritten.
  - normalization_deferred_to_python: |
      Lemma 1 (normalize(x+εδ) ≈ x + ε(δ-⟨x,δ⟩x) + O(ε²)) requires analysis on S^{d-1}.
      Deferred to Python validation. Unnormalized case is exact and covers the mechanism.

