decisions:
  - le_div_iff_naming: "Mathlib4 uses le_div_iff₀ (with subscript 0) for the ordered field version. The plain le_div_iff does NOT exist. The ₀ suffix distinguishes GroupWithZero lemmas from Group lemmas."
  - capacity_as_bridge: "Phase 4 bridges capacity bound (exponential) to Phase 1 conditions (logarithmic). capacity_criterion converts 4NβM² ≤ exp(βδ) to β·δ ≥ log(4NβM²), which is exactly what stored_patterns_are_local_minima needs."
  - pairwise_to_coupling: "coupling_bound_from_pairwise converts a simpler per-pair hypothesis (each coupling term involving k doesn't increase) to the Phase 3 coupling bound hypothesis. This makes coupled_descent_pairwise more usable."

findings:
  - lake_build_only_imports: "CRITICAL: lake build only compiles transitively imported modules. A standalone .lean file NOT imported by HermesNLCDM.lean will NOT be built. Early hook 'success' reports were false positives because Capacity.lean wasn't imported yet. Always add the import to HermesNLCDM.lean FIRST, then fix errors."
  - neg_mul_parsing: "-β * δ is parsed as (-β) * δ in Lean 4, not -(β * δ). Use 'show (-β * δ : ℝ) = -(β * δ) from neg_mul β δ' before exp_neg to make the rewrite match. Same pattern as LocalMinima.lean:438."
  - positivity_needs_cast_pos: "positivity cannot prove 0 < 4 * ↑N * β * M ^ 2 without first establishing 0 < ↑N. Add 'have hN_pos : (0 : ℝ) < ↑N := Nat.cast_pos.mpr (NeZero.pos N)' before the positivity call."
  - exp_product_cancellation: "exp(βδ) * exp(-βδ) = 1 via ← exp_add + ring + exp_zero. Used to convert capacity bound to multiplication form for nlinarith."
  - hook_false_positive_again: "Hook reported compilation success for Capacity.lean before it was imported. Consistent with Phase 3 finding. Always verify with lake build after adding import."

