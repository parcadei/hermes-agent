learnings:
  - key: "autoImplicit false"
    detail: |
      lakefile.lean sets `autoImplicit = false`. All variables like β, M, R must be
      declared explicitly via `variable (β : ℝ)` or in theorem signatures.
      `lake env lean` may not respect this, but `lake build` does.
      ALWAYS use `lake build` for verification, not `lake env lean`.

  - key: "lse_ge_max proof strategy"
    detail: |
      Rewrite `z j = β⁻¹ * (β * z j)` using inv_mul_cancel_left₀,
      then mul_le_mul_of_nonneg_left, Real.le_log_iff_exp_le,
      Finset.single_le_sum with explicit (f := ...).

  - key: "Cauchy-Schwarz discriminant method"
    detail: |
      For dot_le_norms: reduce to dot² ≤ sqNorm u * sqNorm v via sqrt_le_sqrt.
      Then: ∀t, 0 ≤ Σ(u_i + t*v_i)² = sqNorm u + 2t·dot + t²·sqNorm v.
      Specialize t = -dot/sqNorm v, field_simp + ring simplifies to
      sqNorm u - dot²/sqNorm v ≥ 0. Handle v=0 case separately.

  - key: "AM-GM for localEnergy bound"
    detail: |
      ½r² - |M|r = ½(r - |M|)² - ½M² ≥ -½M² ≥ -M².
      nlinarith [sq_nonneg (r - |M|), sq_abs M] closes it.

  - key: "couplingEnergy_abs_le approach"
    detail: |
      Don't unfold sqNorm with `simp only [sqNorm]` — it breaks dot_le_norms unification.
      Instead, keep sqNorm abstract and prove:
      |W(cos) * ni * nj| ≤ |cos| * ni * nj ≤ ni * nj
      using smoothWeight_abs_le and div_mul_cancel₀.

  - key: "compiler-in-the-loop hook"
    detail: |
      Located at ~/.claude/hooks/dist/compiler-in-the-loop.mjs
      Only triggers on Write (line 184: `input.tool_name !== "Write"`).
      Does NOT trigger on Edit. Fix: also accept "Edit" tool_name.
      Also optionally runs Goedel-Prover via LMStudio at localhost:1234.

  - key: "loogle binary location"
    detail: |
      ~/tools/loogle/.lake/build/bin/loogle
      Needs ~10s cold start to load 343MB mathlib.idx.
      Use for type-directed Mathlib lemma search.

  - key: "Finset tactics"
    detail: |
      - positivity handles exp/sum positivity
      - Finset.single_le_sum needs explicit (f := ...) annotation
      - Finset.sum_le_sum takes (fun i _ => ...) not (fun i hi => ...)
      - Finset.sup'_le for bounding sup' from above

