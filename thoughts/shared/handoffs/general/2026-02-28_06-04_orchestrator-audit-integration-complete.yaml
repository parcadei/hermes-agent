  - "Should the proof system be PR'd to NousResearch/hermes-agent or kept on fork?"

decisions:
  - injectable_relevance_strengthens_proof: |
      2nd-order analysis revealed hardcoded Jaccard forces conditional test assertions,
      weakening what the proof actually proves. Injectable Protocol lets tests inject
      lambda q,c: 1.0 to exercise query paths unconditionally. HIGH priority fix.
  - on_rebuild_is_correct_for_proof: |
      O(n) _rebuild_index() is the obviously-correct implementation. Optimizing to
      incremental updates would require additional invariant proofs about index
      consistency — adding complexity to the thing being proven. KEEP naive.
  - encoding_confidence_documented_not_removed: |
      kraken chose to document as write-only with warning rather than remove. Tests
      already reference it. Pragmatic choice — removal would be cleaner but breaks
      more tests for marginal proof value.
  - contradiction_cross_category_behavior: |
      Atlas agent discovered: contradiction detector treats "I prefer dark mode" and
      "I like Python programming" as VALUE_UPDATE on shared "preference" subject,
      superseding the first. This is technically correct behavior of the detector
      but worth noting for future refinement.

