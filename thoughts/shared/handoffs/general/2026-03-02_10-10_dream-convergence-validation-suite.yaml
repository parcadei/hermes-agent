findings:
  key_insight_beta_reduction: |
    Dreams provably reduce the beta required for precise retrieval.
    Pre-dream: P@1=1.0 requires beta=35. Post-dream: beta=20 suffices.
    This is the capacity formula prediction confirmed empirically:
    wider delta_min -> lower beta threshold -> more energy-efficient retrieval.
  scaling_exponent: |
    Empirical O(N^1.64) vs theoretical O(N^2). Early-exit optimizations in
    repulsion/prune/merge reduce effective exponent. But still polynomial —
    N>30K needs approximate nearest neighbor (ANN) for production use.
  repulsion_plateau: |
    delta_min plateaus at cycle 7 (0.300) — only 36% of capacity threshold (0.829)
    at beta=10. Repulsion alone can't cross the threshold; beta must also increase.
  no_pruning_at_scale: |
    At dim=384 with 200 topics, within-cluster cosine (~0.34) is below prune (0.95)
    and merge (0.90) thresholds. Only repulsion fires. This is physically correct —
    high-dimensional patterns are naturally well-separated.

