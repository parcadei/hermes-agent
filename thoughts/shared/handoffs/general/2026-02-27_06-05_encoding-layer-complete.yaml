questions:
  - "Retrieval integration: should recall be sync (blocks prompt assembly) or async (prefetch while other layers build)?"
  - "How to handle existing memory tool's flat-file snapshot vs dynamic per-turn recall?"
  - "Should retrieval scoring live in Python (simple) or Rust+PyO3 (perf for hot path)?"

decisions:
  - python_now_rust_later: "Encoding layer in Python (heuristic text classification, not perf-sensitive). Rust+PyO3 planned for dynamics engine and retrieval scoring (pieces 2+5) where perf matters."
  - post_segmentation_gate: "Gate sits after Nemori's segmentation, not before buffer. Episodes provide richer context for classification than individual messages."
  - heuristic_first: "Rule-based classifier with LLM upgrade path. classify() is the extension point — swap heuristics for LLM without touching write policy."
  - fail_open_design: "Gate's primary value is importance seeding and category annotation, not filtering. Fail-open at confidence < 0.5 ensures no important memories are lost."
  - importance_seeding: "correction=0.9, instruction=0.85, preference=0.8, fact=0.6, reasoning=0.4. Seeds dynamics from creation instead of waiting for feedback loop."
  - per_category_dynamics: "Category metadata enables per-category (alpha, beta) regimes. Corrections get slower decay than reasoning. Interface ready via EncodingDecision.category."
  - dual_pattern_sets: "First-person ('I like') + third-person ('The user expressed a preference') patterns. Nemori produces 3rd-person narratives."

findings:
  - adversarial_critical_1: "Episode narratives are 3rd-person, not 1st-person. Original patterns would have failed on real Nemori output. Fixed with dual pattern sets."
  - adversarial_critical_2: "Fail-open triggers on >95% of inputs with naive confidence scoring. Fixed with SINGLE_PATTERN_CONFIDENCE_FLOOR=0.35 calibration."
  - adversarial_critical_3: "Gate rejects ~0-5% of episodes because Nemori's segmentation already filters standalone greetings. Reframed gate purpose as importance seeder."
  - adversarial_critical_4: "Nemori's knowledge_type is a better classifier than heuristics for semantic memories. Added KNOWLEDGE_TYPE_TO_CATEGORY shortcut."
  - audit_critical_fixes: "Pre-compiled regex (perf), ReDoS mitigation (max_input_length), Unicode normalization (NFKC), safe metadata access, semantic memory bypass, reclassification fallback."

