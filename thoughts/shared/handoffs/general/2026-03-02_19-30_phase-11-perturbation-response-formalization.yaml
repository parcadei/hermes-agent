findings:
  rem_explore_mechanism: |
    Python rem_explore_cross_domain_xb (dream_ops.py:1163) implements PGO wave simulation:
    1. Sample cross-cluster pairs (x_i, x_j)
    2. Generate K=10 random perturbation vectors δ_k, scale ε=0.01
    3. Compute responses: r_i = X @ normalize(x_i + εδ_k), r_j = X @ normalize(x_j + εδ_k)
    4. Pearson-correlate r_i and r_j across all K*N values
    5. Pairs with |corr| > 0.3 are associations

    Key mathematical insight: X@(x+εδ) = X@x + εX@δ. The Pearson correlation of responses
    is driven by the shared εX@δ term. Cov(X@δ, X@δ) = X^TX/d for uniform δ on S^{d-1}.
    This means perturbation-response covariance IS the coupling matrix. That's why it works.

  loogle_results: |
    Building blocks for Phase 11 proof:

    Matrix linearity:
      - Matrix.mulVec_add (Data.Matrix.Mul) — X@(a+b) = X@a + X@b
      - Matrix.mulVec_smul (Data.Matrix.Mul) — X@(c·v) = c·(X@v)
      - Matrix.vecMul_transpose (Data.Matrix.Mul) — v^T·X = X^T·v

    Inner product:
      - inner_add_left (Analysis.InnerProductSpace.Basic) — ⟨a+b,c⟩ = ⟨a,c⟩+⟨b,c⟩
      - inner_smul_left (Analysis.InnerProductSpace.Basic) — ⟨c·a,b⟩ = c·⟨a,b⟩

    Covariance/Variance (66+ theorems):
      - ProbabilityTheory.covariance (Probability.Moments.Covariance)
      - ProbabilityTheory.covariance_add_left — Cov(f+g, h) = Cov(f,h)+Cov(g,h)
      - ProbabilityTheory.covariance_const_mul_left — Cov(c·f, g) = c·Cov(f,g)
      - ProbabilityTheory.covariance_const_left — Cov(const, f) = 0
      - ProbabilityTheory.covariance_comm, covariance_same
      - ProbabilityTheory.variance (Probability.Moments.Variance) — 75+ theorems

    MISSING from Mathlib:
      - Pearson correlation definition (need to define: Cov/sqrt(Var·Var))
      - Expectation of X^T δ ⊗ X^T δ for uniform δ on S^{d-1}
        (but can be stated algebraically for finite samples)
      - Normalization Taylor expansion (deferred to Python)

  proof_strategy: |
    THREE LEMMAS (two for Lean, one for Python):

    Lemma 1 (PYTHON ONLY — too hard for Lean):
      normalize(x + εδ) ≈ x + ε(δ - ⟨x,δ⟩x) + O(ε²)
      Needs analysis on S^{d-1}, explicit error bounds. Deferred.

    Lemma 2 (LEAN — algebraic, load-bearing):
      Cov(X@δ, X@δ) = X^TX/d for uniform δ
      "Perturbation-response covariance IS the coupling matrix"
      Uses: Matrix.mulVec_add, covariance_add_left, covariance_const_mul_left
      Can state for finite samples to avoid spherical measure.

    Lemma 3 (LEAN — algebraic):
      Corr(r_i, r_j) ≥ monotone function of (X^TX)_{ij} / sqrt((X^TX)_{ii}·(X^TX)_{jj})
      Follows from Lemma 2 + Cauchy-Schwarz infrastructure

    BRIDGE TO PHASE 8:
      If Corr ≥ threshold implies Phase 8 bridge condition (dotSim ≥ τ),
      then REM-explore discovery → bridge formation → transfer is formally verified end-to-end.

  what_the_theorem_covers: |
    MEMORY (proven, Phases 1-10): store cross-domain thought → dream consolidation →
    centroid formation → bridge persistence → retrieval. "Remembering insights you've had."

    CREATIVITY (Phase 11 target): within-domain query → REM perturbation →
    cross-domain discovery. "Generating insights you haven't had."

    The tribunal's discriminative finding (from earlier session):
    - Transfer theorem works when query IS the cross-domain thought (100% delta>0)
    - Fails when query is pure within-domain hoping for bridge (0% delta>0)
    - REM-explore empirically works (5 associations on real embeddings) via perturbation-response
    - Phase 11 would formalize WHY perturbation-response works → close the creativity gap

