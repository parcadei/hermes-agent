decisions:
  - coordinate_descent_approach: "Used alternating minimization / coordinate descent instead of simultaneous update. Update one memory k while freezing others. This is cleaner to prove and matches Gauss-Seidel style optimization."
  - coupling_bound_as_hypothesis: "Made the coupling bound an explicit hypothesis rather than deriving it from norm constraints. This keeps the theorem general — any sufficient bound works. A future theorem can instantiate it."
  - double_sum_decomposition: "Decomposed the double sum ∑_i ∑_j into row-k terms (i=k), col-k terms (j=k), and unchanged terms (i≠k ∧ j≠k). Used Finset.add_sum_erase to extract the k-th row, then the k-th column from remaining rows."
  - split_if_sub_lemma: "Proved inline helper: ∑(if P then a-b else 0) = ∑(if P then a else 0) - ∑(if P then b else 0). Used Finset.sum_sub_distrib + split_ifs."

