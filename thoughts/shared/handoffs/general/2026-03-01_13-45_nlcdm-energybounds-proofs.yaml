critical_discovery:
  autoImplicit_false: |
    The lakefile sets `autoImplicit := false`. When using `lake build` (which the
    compiler-in-the-loop hook uses), β, M, R must be explicitly declared as
    variables or parameters. `lake env lean` was more permissive — it allowed
    autoImplicit. ALL theorems in EnergyBounds.lean need explicit variable decls.

    Fix: Add `variable (β : ℝ) (M : ℝ) (R : ℝ)` at the top of the namespace,
    OR make them explicit parameters in each theorem signature like:
      theorem lse_ge_max {N : ℕ} [NeZero N] {β : ℝ} (hβ : 0 < β) ...

    Energy.lean handles this by passing β through SystemConfig.β or as explicit
    function params (e.g., `logSumExp (β : ℝ)`).

  compiler_hook_only_fires_on_Write: |
    The compiler-in-the-loop hook (PostToolUse) only triggers on `Write` tool,
    NOT `Edit`. Line 184 of compiler-in-the-loop.mjs:
    `if (input.tool_name !== "Write")`. Use Write for .lean files to get
    compiler feedback + Goedel-Prover suggestions.

  loogle_binary_location: |
    ~/tools/loogle/.lake/build/bin/loogle — works with mathlib.idx.
    NOT on PATH as `loogle-search`. Use full path:
    ~/tools/loogle/.lake/build/bin/loogle "query"
    First query takes ~10s to load 343MB index. Use for finding Mathlib lemma names.

