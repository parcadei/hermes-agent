decisions:
  - score_not_clamped: "Boosted score (base + novelty) can exceed 1.0. Clamping would kill novelty bonus for high-scoring memories, violating cold-start survival guarantee."
  - pairwise_tournament: "N>2 memories use sequential pairwise tournament via soft_select. Lean proofs cover N=2; N>2 is empirically validated, not formally proven."
  - oat_sensitivity: "One-at-a-time perturbation chosen over Morris/Sobol. Misses parameter interactions but sufficient for identifying insensitive params to fix at defaults."
  - weight_renormalization: "When perturbing w1-w4, other weights are renormalized to maintain sum=1. This violates OAT assumption (noted in report)."
  - dynamics_only_visibility: "8/14 parameters are invisible to static scoring (only affect contraction margin). Classification uses margin erosion rule: sensitive if margin drops below 50% of baseline."

findings:
  - broken_scenarios: "AR-1 and SF-2 had wrong expected winners. Calculated actual scores to verify. Fixed: AR-1 M0 last_access_time=5.0/strength=3.0; SF-2 M1 last_access_time=20.0."
  - eight_invisible_params: "alpha, beta, delta_t, s_max, s0, temperature, feedback_sensitivity, survival_threshold don't appear in score_memory(). Their sensitivity is ONLY detectable through contraction margin changes."
  - sensitivity_results: "Critical: beta, delta_t, temperature (contraction boundary). Sensitive: alpha, s_max (contraction-coupled), w1, w2, w4 (affect scenario winners). Insensitive: feedback_sensitivity, novelty_decay, novelty_start, s0, survival_threshold, w3."
  - free_params_for_cmaes: "~5-6 truly free parameters for CMA-ES: w1, w2, w4 (ranking), alpha, beta, temperature (stability). Rest can be fixed at defaults."
  - test_statistical_fix: "test_select_large_score_gap at T=5.0 had win probability ~54.5%, not 80%. Fixed by using T=0.5 with contraction-safe params for that specific test."

