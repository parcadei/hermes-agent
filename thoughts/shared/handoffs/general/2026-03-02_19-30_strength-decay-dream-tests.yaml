findings:
  proof_system_coverage: |
    hermes-memory proves: forgetting curve, strength decay/convergence,
    soft selection (0,1), novelty bonus, composition safety (anti-lock-in +
    anti-thrashing + anti-cold-start), Banach fixed-point (unique stationary
    state with global convergence).
    hermes-NLCDM proves: energy wells, Hopfield update descent (strict at
    non-fixed points), exponential capacity N~exp(βδ)/(4βM²), coupling bounds,
    modular/block-diagonal structure, Lyapunov function for coordinate descent,
    temperature parameterization, spurious state characterization, energy gaps,
    basin volumes.
  gap_between_systems: |
    The two Lean proof systems share no imports. The bridge is conceptual:
    hermes-memory's β (decay rate) ≠ hermes-NLCDM's β (inverse temperature).
    Formalizing the bridge would require a joint Lean file connecting
    StrengthDecay's temporal dynamics to NLCDM's capacity formula.
  soft_select_sensitivity: |
    At low temperature (T=0.1), soft_select is near-deterministic.
    Initial conditions (0.1, 0.9) vs (0.9, 0.1) converge to DIFFERENT
    attractors — the system has two stable fixed points, not one.
    The contraction condition only holds when T is large enough that
    the Lipschitz constant L of soft_select is small.

