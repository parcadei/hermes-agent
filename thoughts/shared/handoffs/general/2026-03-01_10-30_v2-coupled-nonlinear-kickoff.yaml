decisions:
  - v2_is_coupled_nonlinear: |
      V1 proof system uses independent dynamical equations per memory (decoupled).
      V2 will couple memories — each memory's dynamics depend on neighbors.
      This enables emergent behavior like memory consolidation via attractor basins.
  - lean_proofs_first: |
      V2 starts with formal Lean proofs before Python implementation.
      Opposite order from V1 (which was Python Hypothesis proofs first).
      Lean gives stronger guarantees for nonlinear dynamics properties.
  - benchmark_v1_vs_v2: |
      Both versions will be benchmarked against LoCoMo and MemoryBench
      to measure whether coupled dynamics actually improves recall quality.

