decisions:
  - emotion_is_dimensional_not_categorical: |
      NLP literature (EMNLP 2021, NRC-VAD) confirms emotion is a dimensional modifier,
      not a flat category. "I'm frustrated with TypeScript" is a preference with negative
      valence. Separate category loses semantic content. Psychology confirms ambivalence
      (contradictory emotions coexist), so contradiction detection is psychologically incorrect.
  - correction_patterns_need_compound_context: |
      _make_pattern_regex() strips trailing space/comma before adding \b anchors, so
      "no," and "no " both compile to \bno\b — identical. Root cause was deeper than
      expected. Compound patterns ("no, i ", "no, actually") achieve ~80% precision
      per speech act research.
  - validation_corpus_needs_210_plus: |
      Oracle found 50 examples too small for statistical significance. Need 30+ per class
      (210+ total for 7 categories). Per-class precision thresholds better than overall
      accuracy: >=80% for correction/instruction, >=70% for preference/fact.
  - fasttext_over_langdetect: |
      Oracle recommended FastText lid.176.ftz for production. For proof system, used
      lightweight ASCII-ratio heuristic instead (no external dependencies).
  - issue4_episode_merging_is_NA: |
      Scout confirmed: no merge logic exists in codebase. Each episode classified
      individually. Future concern only.

